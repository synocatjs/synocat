<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker 安装成功</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="docker-icon">
                🐳
            </div>
            <h1>✅ 安装成功！</h1>
            <p class="message">您的 Docker 容器已成功运行</p>
            
            <div class="info">
                <div class="info-item">
                    <span class="label">容器名称:</span>
                    <span class="value" id="containerName">web-app</span>
                </div>
                <div class="info-item">
                    <span class="label">运行时间:</span>
                    <span class="value" id="runTime">-</span>
                </div>
                <div class="info-item">
                    <span class="label">服务器:</span>
                    <span class="value">Nginx/Alpine</span>
                </div>
            </div>
            
            <div class="success-steps">
                <h3>🎉 下一步操作</h3>
                <ul>
                    <li>✅ Docker 容器运行正常</li>
                    <li>✅ Web 服务已启动</li>
                    <li>✅ 网页可以正常访问</li>
                </ul>
            </div>
            
            <div class="commands">
                <h3>📦 常用 Docker 命令</h3>
                <div class="command-block">
                    <code>docker ps</code>
                    <span>查看运行中的容器</span>
                </div>
                <div class="command-block">
                    <code>docker logs web-app</code>
                    <span>查看容器日志</span>
                </div>
                <div class="command-block">
                    <code>docker stop web-app</code>
                    <span>停止容器</span>
                </div>
                <div class="command-block">
                    <code>docker start web-app</code>
                    <span>启动容器</span>
                </div>
            </div>
            
            <div class="footer">
                <p>Powered by Docker & Nginx</p>
                <p class="version">版本 1.0.0</p>
            </div>
        </div>
    </div>
    
    <script>
        // 显示运行时间
        function updateRunTime() {
            const startTime = new Date();
            setInterval(() => {
                const now = new Date();
                const diff = Math.floor((now - startTime) / 1000);
                const hours = Math.floor(diff / 3600);
                const minutes = Math.floor((diff % 3600) / 60);
                const seconds = diff % 60;
                document.getElementById('runTime').textContent = 
                    `${hours}小时 ${minutes}分钟 ${seconds}秒`;
            }, 1000);
        }
        
        updateRunTime();
        
        // 控制台输出
        console.log('%c🐳 Docker 容器运行成功！', 'color: #2496ed; font-size: 16px; font-weight: bold;');
        console.log('访问地址: http://localhost:8080');
    </script>
</body>
</html>
